<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Royale Fortune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      color: gold;
    }

    .slot {
      font-size: 40px;
      margin: 30px 0;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: gold;
      color: black;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🎰 Royale Fortune</h1>

<div class="slot" id="slot">🍒 | 🍒 | 🍒</div>

<button onclick="spin()">Крутить</button>

<div class="result" id="result"></div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  function spin() {
    const symbols = ["🍒", "💎", "👑", "7️⃣", "🍋"];

    let a = symbols[Math.floor(Math.random() * symbols.length)];
    let b = symbols[Math.floor(Math.random() * symbols.length)];
    let c = symbols[Math.floor(Math.random() * symbols.length)];

    document.getElementById("slot").innerText = `${a} | ${b} | ${c}`;

    if (a === b && b === c) {
      document.getElementById("result").innerText = "💥 Джекпот!";
    } else if (a === b || b === c || a === c) {
      document.getElementById("result").innerText = "✨ Выигрыш!";
    } else {
      document.getElementById("result").innerText = "😢 Проигрыш";
    }
  }
</script>

</body>
</html>
